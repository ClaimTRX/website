<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CFT Swap | CFT Ecosystem</title>
    <link rel="icon" href="assets/img/favicon.png" />
    <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
    <div class="main">
        <!-- Header -->
        <header id="header">
            <nav class="navbar gameon-navbar navbar-expand">
                <div class="container header">
                    <a class="navbar-brand" href="index.html">
                        <img src="assets/img/logo/logo.png" alt="CFT Logo" />
                    </a>
                    <div class="ms-auto"></div>
                    <ul class="navbar-nav items mx-auto">
                        <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                        <li class="nav-item"><a href="cftswap.html" class="nav-link active">Swap</a></li>
                        <li class="nav-item"><a href="buycft.html" class="nav-link">Buy CFT</a></li>
                        <li class="nav-item"><a href="sellcft.html" class="nav-link">Sell CFT</a></li>
                    </ul>
                    <ul class="navbar-nav action">
                        <li class="nav-item ms-2">
                            <button id="connect-button" class="btn btn-bordered-white">
                                <i class="icon-wallet me-md-2"></i> Wallet Connect
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>
        </header>

        <!-- Hero -->
        <section class="hero-section">
            <div class="container">
                <div class="row align-items-center justify-content-center">
                    <div class="col-12 col-md-6 col-lg-9 text-center">
                        <div class="hero-content">
                            <div class="intro text-center mb-5">
                                <span class="intro-text">CFT Ecosystem</span>
                                <h1 class="mt-4">Swap CFT</h1>
                                <p>Swap CFT across various pools</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Swap Box -->
        <section class="staking-area">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-8 single-staking-item input-box">
                        <div class="card p-4">
                            <div class="d-flex align-items-center mb-4">
                                <img src="assets/img/content/cftlogo518.png" alt="CFT" class="me-3" style="width: 50px;">
                                <div>
                                    <h4 class="m-0">Swap CFT</h4>
                                    <small>Swap between CFT and other tokens</small>
                                </div>
                            </div>
                            <hr />

                            <label for="from-token">From</label>
                            <select id="from-token" class="form-select mb-3"></select>
                            <input type="number" id="from-amount" placeholder="0" class="form-control mb-3" />
                            <button id="max-button" class="btn btn-sm btn-bordered mb-3">MAX</button>

                            <label for="to-token">To</label>
                            <select id="to-token" class="form-select mb-3"></select>
                            <input type="text" id="to-amount" placeholder="0" class="form-control mb-3" disabled />

                            <label for="slippage">Slippage (%)</label>
                            <input type="number" id="slippage" value="1" class="form-control mb-3" />

                            <div class="mb-3">
                                <span>Rate: <strong id="exchange-rate">--</strong></span>
                            </div>

                            <button id="swap-button" class="btn btn-primary w-100">Swap Now</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer-area">
            <div class="container text-center">
                <a class="navbar-brand" href="index.html"><img src="assets/img/logo/logo.png" alt="" /></a>
                <div class="social-icons my-4">
                    <a href="https://x.com/CFTTRC20" target="_blank"><i class="fab fa-x-twitter"></i></a>
                    <a href="https://www.reddit.com/" target="_blank"><i class="fab fa-reddit"></i></a>
                    <a href="https://t.me/CFTEcosystem" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                </div>
                <div class="copyright-area py-4">&copy;2025 CFT Ecosystem, All Rights Reserved</div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="assets/js/vendor/jquery.min.js"></script>
    <script src="assets/js/vendor/popper.min.js"></script>
    <script src="assets/js/vendor/bootstrap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.min.js"></script>
    <script src="assets/js/myswap.js"></script>
</body>
</html>
