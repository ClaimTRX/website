<!DOCTYPE html>
<html class="no-js" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CFT Swap</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
  <div class="main">
    <!-- Swap Area -->
    <section class="staking-area">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10">
            <div class="single-accordion-item">
              <div class="card-header bg-inherit border-0 p-0">
                <h2 class="m-0">
                  <button class="btn staking-btn d-block text-start w-100 py-4">
                    <div class="row">
                      <div class="col-12 col-md-8">
                        <div class="media flex-column flex-md-row">
                          <img class="avatar-max-lg" src="assets/img/content/cftlogo518.png" alt="">
                          <div class="content media-body mt-4 mt-md-0 ms-md-4">
                            <h4 class="m-0">Swap CFT</h4>
                            <p>Swap CFT across various pools</p>
                          </div>
                        </div>
                      </div>
                    </div>
                  </button>
                </h2>
              </div>
              <div class="card-body">
                <div class="row">

                  <!-- From Token -->
                  <div class="col-12 col-md-4 single-staking-item input-box">
                    <span class="item-title mb-2">From</span>
                    <select id="from-token" class="form-select mb-2">
                      <option value="WTRX">TRX</option>
                      <option value="KING">KING</option>
                      <option value="TWX">TWX</option>
                      <option value="BBT">BBT</option>
                      <option value="TEM">TEM</option>
                    </select>
                    <input type="text" placeholder="Amount" id="from-amount" class="form-control">
                  </div>

                  <!-- To Token -->
                  <div class="col-12 col-md-4 single-staking-item input-box">
                    <span class="item-title mb-2">To</span>
                    <select id="to-token" class="form-select mb-2">
                      <option value="CFT">CFT</option>
                    </select>
                    <input type="text" id="to-amount" class="form-control" readonly>
                    <span id="swap-rate" class="mt-2 d-block">Rate: --</span>
                  </div>

                  <!-- Swap Button -->
                  <div class="col-12 col-md-4 single-staking-item input-box d-flex flex-column justify-content-end">
                    <a href="#" class="btn input-btn mt-4" id="swap-button">
                      <i class="fa-solid fa-retweet me-2"></i>Swap Now
                    </a>
                  </div>

                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- TronWeb & Custom Script -->
  <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.min.js"></script>
  <script src="assets/js/myswap.js"></script>
</body>

</html>
