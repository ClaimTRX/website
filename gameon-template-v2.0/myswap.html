<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySwap - Token Swap</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        #swap-interface { display: none; }
        .token-section { margin: 20px 0; }
        select, input { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
        .balance { font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div id="wallet-connect">
        <h2>MySwap</h2>
        <button onclick="connectWallet()">Connect TronLink Wallet</button>
    </div>

    <div id="swap-interface">
        <h2>Swap Tokens</h2>
        <div class="token-section">
            <label>From:</label>
            <select id="token-from"></select>
            <input type="number" id="amount-in" placeholder="Amount" min="0" step="0.01">
            <span id="balance-from" class="balance"></span>
        </div>
        <div class="token-section">
            <label>To:</label>
            <select id="token-to"></select>
            <span id="expected-out"></span>
            <span id="balance-to" class="balance"></span>
        </div>
        <div>
            <button id="approve-btn" style="display: none;" onclick="approveToken()">Approve</button>
            <button id="swap-btn" style="display: none;" onclick="executeSwap()">Swap</button>
        </div>
    </div>

    <script src="assets/js/myswap.js"></script>
</body>
</html>
