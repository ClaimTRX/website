    <script>
        // Manually defined list of allowed addresses
        const allowedAddresses = [
            "TR2XJawheHUAcbxgzABVh1toDA59Eb4RbM",
            "TQLrSGjNtYwtUdttbm4HsXxD6vmbePWni4",
            "TL71zkkpC59dKmj8CeVf3woiXJuTNGBUfw",
            "TKsFvPSTxZhym26K3uscKbbt8K29UbpVZd",
            "TJDMQzjJSh5eC8WezVtnDXDuWXAwjV23eF",
            "TFUQ7aqaxoDVskZ9ucWCCaLBeLKSSLa5hS",
            "TCGsvNmNtezmeHZgnH2fd8gGa2KV5rUkHV",
            "TC56nRBaobbqPWMCgS3FhMf7EjqyYZ7StR",
            "TB6xoAXGdPY4D3j3cnojjkkcoWwrNGHox7",
            "TXgL1i4dF1vEhDYuVsMuo8ovcfdEE6tztA",
            "TB4euGueRixvU79TBbotkLtQ4ZtD2UJsy6"
        ];

        // Global variables
        let tronWeb, userAddress;

        // Check if TronLink is installed
        async function checkTronLinkInstalled() {
            return new Promise((resolve) => {
                const interval = setInterval(() => {
                    if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                        clearInterval(interval);
                        resolve(true);
                    }
                }, 1000);

                // Timeout after 10 seconds
                setTimeout(() => {
                    clearInterval(interval);
                    resolve(false);
                }, 10000);
            });
        }

        // Connect to TronLink wallet
        async function connectWallet() {
            if (!window.tronWeb) {
                alert("TronLink not found. Please install TronLink and log in.");
                return;
            }

            try {
                await window.tronLink.request({ method: "tron_requestAccounts" });
                tronWeb = window.tronWeb;
                userAddress = tronWeb.defaultAddress.base58;
                const connectButton = document.getElementById('connect-button');
                if (connectButton) {
                    connectButton.innerHTML = `<i class="icon-wallet me-md-2"></i> Wallet Connected`;
                }
                console.log("Connected to TronLink:", userAddress);
                await checkAllowedAddress();
            } catch (e) {
                console.error("Failed to connect:", e);
                const msgElement = document.getElementById('msg');
                if (msgElement) {
                    msgElement.textContent = "Failed to connect wallet. Please try again.";
                    setTimeout(() => msgElement.textContent = '', 5000);
                }
            }
        }

        // Check if the user's address is in the allowed list
        async function checkAllowedAddress() {
            const energyCard = document.getElementById('energy-card');
            const accessDenied = document.getElementById('access-denied');
            const connectWalletMessage = document.getElementById('connect-wallet-message');

            if (!energyCard || !accessDenied || !connectWalletMessage) {
                console.error("Required DOM elements not found.");
                return;
            }

            if (allowedAddresses.includes(userAddress)) {
                console.log("Access granted for:", userAddress);
                energyCard.style.display = 'block';
                accessDenied.style.display = 'none';
                connectWalletMessage.style.display = 'none';
            } else {
                console.log("Access denied for:", userAddress);
                energyCard.style.display = 'none';
                accessDenied.style.display = 'block';
                connectWalletMessage.style.display = 'none';
            }
        }

        // Request energy via API
        async function callDelegationEndpoint() {
            const url = 'https://0rtix684bi.execute-api.eu-west-1.amazonaws.com/claimfreetrxtwo/claimfreetrxtwo';
            const payload = {
                AllocationAddress: userAddress,
                IsDelegation: true
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer abc'
                    },
                    body: JSON.stringify(payload),
                });
                const data = await response.json();
                const messageElement = document.getElementById('msg');
                if (messageElement) {
                    messageElement.textContent = data.Message;
                    setTimeout(() => messageElement.textContent = '', 5000);
                }
            } catch (error) {
                console.error("Network or server error:", error);
                const messageElement = document.getElementById('msg');
                if (messageElement) {
                    messageElement.textContent = `Network or server error: ${error.message}`;
                    setTimeout(() => messageElement.textContent = '', 5000);
                }
            }
        }

        // Page load logic
        document.addEventListener('DOMContentLoaded', async () => {
            const connectButton = document.getElementById('connect-button');
            const requestEnergyButton = document.getElementById('request-energy-button');
            const connectWalletMessage = document.getElementById('connect-wallet-message');
            const accessDenied = document.getElementById('access-denied');
            const energyCard = document.getElementById('energy-card');

            // Initial UI state
            if (!connectWalletMessage || !accessDenied || !energyCard) {
                console.error("Required DOM elements not found on page load.");
                return;
            }

            // Check if TronLink is installed and auto-connect
            const isTronLinkInstalled = await checkTronLinkInstalled();
            if (isTronLinkInstalled) {
                await connectWallet();
            } else {
                connectWalletMessage.style.display = 'block';
                accessDenied.style.display = 'none';
                energyCard.style.display = 'none';
            }

            // Event listeners
            if (connectButton) {
                connectButton.addEventListener('click', async () => {
                    await connectWallet();
                });
            } else {
                console.error("Connect button not found.");
            }

            if (requestEnergyButton) {
                requestEnergyButton.addEventListener('click', async () => {
                    await callDelegationEndpoint();
                });
            } else {
                console.error("Request energy button not found.");
            }
        });
    </script>
