<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Staking - All Stakers List</title>
  <link rel="icon" href="assets/img/favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    :root{--bg-0:#07090f;--bg-1:#0b0e17;--bg-2:#0f1321;--line:#212b46;--muted:#9aa7bd;--txt:#e9eef7;--accent-1:#62ffcf;--accent-2:#7db2ff;--danger:#ff5b73;--warning:#ffd166;--success:#00e095;--radius-3:18px;--shadow-1:0 10px 30px rgba(0,0,0,.55)}
    body{background:var(--bg-0);color:var(--txt);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial}
    .luxe-card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:var(--radius-3);box-shadow:var(--shadow-1);padding:2rem;margin-bottom:2rem}
    table{width:100%;border-collapse:separate;border-spacing:0 0.75rem}
    th{background:var(--bg-2);padding:1rem;text-align:left;font-weight:700}
    td{background:var(--bg-2);padding:1rem;border-radius:8px}
    .addr{font-family:ui-monospace,monospace;font-size:0.92rem;color:var(--accent-2);cursor:pointer;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .addr:hover{color:var(--accent-1)}
    .expired{color:var(--danger);font-weight:700}
    .soon{color:var(--warning);font-weight:700}
    .progress-text{font-size:0.9rem;color:var(--muted)}
    .progress-bar{background:linear-gradient(90deg,var(--accent-1),var(--accent-2))}
    .section-title{font-size:1.5rem;margin-bottom:1rem}
    .section-total{text-align:right;color:var(--muted);font-size:0.95rem;margin-top:1rem}
    /* Mobile card layout - perfect spacing */
    @media (max-width:768px){
      table,thead,tbody,th,td,tr{display:block}
      thead tr{position:absolute;top:-9999px;left:-9999px}
      tr{margin-bottom:1.2rem;border:1px solid var(--line);border-radius:12px;padding:1rem;background:var(--bg-2);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
 
      td{border:none;position:relative;padding:0.4rem 0 0.4rem 0;text-align:left !important}
      td:first-child{padding-top:0}
      td:last-child{padding-bottom:0}
 
      td:before{
        content:attr(data-label);
        display:block;
        font-weight:700;
        color:var(--muted);
        margin-bottom:0.35rem;
        font-size:0.95rem;
      }
 
      /* Special: make wallet address appear below the label */
      td[data-label="Wallet"]{
        padding-top:0.6rem;
      }
      td[data-label="Wallet"] .addr{
        margin-top:0.4rem;
        font-size:1rem;
      }
    }
  </style>
</head>
<body>
<header id="header" class="pt-2">
  <nav class="navbar navbar-expand">
    <div class="container">
      <a class="navbar-brand" href="index.html"><img src="assets/img/logo/logo.png" height="48" alt=""></a>
      <ul class="navbar-nav items mx-auto">
        <li class="nav-item"><a href="poolstaking.html" class="nav-link">Earn TRX</a></li>
        <li class="nav-item"><a href="stakers-list.html" class="nav-link active">Stakers List</a></li>
      </ul>
      <ul class="navbar-nav action">
        <li><button id="connect-button" class="btn btn-outline">Wallet Connect</button></li>
      </ul>
    </div>
  </nav>
</header>
<section class="hero-section">
  <div class="container text-center">
    <span class="intro-text">Ecosystem</span>
    <h1 class="display-5">All Stakers List</h1>
    <p>Sorted by staked amount</p>
  </div>
</section>
<section class="py-5">
  <div class="container">
    <ul class="nav nav-tabs mb-4" id="tabs-container"></ul>
    <div class="tab-content" id="tab-content"></div>
  </div>
</section>
<footer class="footer-area py-5 mt-3">
  <div class="container text-center">
    <a class="navbar-brand" href="index.html"><img src="assets/img/logo/logo.png" height="28" alt=""></a>
    <div class="copyright-area py-2">©2025 Ecosystem</div>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/loadstakers.js" type="module"></script>
</body>
</html>
